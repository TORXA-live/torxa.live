<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TORXA</title>
    <meta
      name="description"
      content="TORXA builds value around musical talent through initiatives that connect artists, industry and community."
    />

    <link rel="icon" type="image/svg+xml" href="assets/torxa-logo.svg" />
    <link rel="alternate icon" href="assets/torxa-logo.svg" />

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <div class="hero-inner">
          <img
            src="assets/torxa-logo.svg"
            alt="TORXA logo"
            class="logo"
          />

          <p class="eyebrow">BARCELONA · MUSIC · CULTURE</p>

          <h1>
            We build value around musical talent.
          </h1>

          <p class="supporting-text">
            We identify trends, activate collaborations, and develop initiatives
            that connect artists, industry, and community.
          </p>
        </div>
      </section>

      <footer class="footer">
        <div class="footer-inner">
          <span class="copyright">© TORXA</span>

          <nav class="socials" aria-label="Social media">
            <a href="https://youtube.com" target="_blank" rel="noopener noreferrer">YouTube</a>
            <a href="https://instagram.com" target="_blank" rel="noopener noreferrer">Instagram</a>
            <a href="https://tiktok.com" target="_blank" rel="noopener noreferrer">TikTok</a>
          </nav>
        </div>
      </footer>
    </main>
  </body>
</html>
